services:
  - type: web
    name: smart-tourism-indore
    env: node
    plan: free
    buildCommand: npm run setup
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: sqlite-db-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
