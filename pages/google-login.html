<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Sign-In Simulation – Smart Tourism Indore</title>
  <style>
    :root {
      --saffron: #FF6B2B;
      --deep-teal: #0A4D5C;
      --cream: #FDF8F0;
      --dark: #0D1B2A;
      --text: #2C3E50;
      --muted: #7F8C8D;
      --radius: 16px;
      --border: #E8E0D5;
    }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background-color: var(--cream);
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .warning-banner {
      background-color: #FFF3CD;
      color: #856404;
      border: 1px solid #FFEEBA;
      padding: 12px 16px;
      border-radius: 8px;
      max-width: 400px;
      text-align: center;
      margin-bottom: 24px;
      font-size: 0.88rem;
      font-weight: 500;
    }
    .card {
      background: #ffffff;
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(10, 77, 92, 0.08);
      border: 1px solid var(--border);
    }
    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo-emoji {
      font-size: 40px;
      background: linear-gradient(135deg, var(--saffron), #F4B942);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin: 0 0 8px 0;
      color: var(--deep-teal);
    }
    .subtitle {
      font-size: 14px;
      text-align: center;
      color: var(--muted);
      margin: 0 0 28px 0;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--deep-teal);
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      background: #FDFDFD;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: var(--saffron);
    }
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
    }
    .create-link {
      color: var(--deep-teal);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .create-link:hover {
      text-decoration: underline;
    }
    .btn-next {
      background-color: var(--deep-teal);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-next:hover {
      background-color: var(--saffron);
    }
  </style>
</head>
<body>

<div class="warning-banner">
  ⚠️ <strong>DEMO SIMULATION:</strong> This is a safe OAuth simulation for testing the Smart Tourism portal. It does not connect to real Google services.
</div>

<div class="card">
  <div class="logo-container">
    <div class="logo-emoji">🗺️</div>
  </div>
  <h2 class="title">Google Sign-In Simulator</h2>
  <p class="subtitle">OAuth verification for Smart Tourism Indore</p>
  
  <form id="googleLoginForm">
    <div class="form-group">
      <label class="form-label" for="email">Simulation Email</label>
      <input type="email" id="email" class="form-input" placeholder="name@example.com" required autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Simulation Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
    </div>
    
    <div class="actions">
      <a class="create-link" onclick="window.close()">Cancel</a>
      <button type="submit" class="btn-next">Simulate Google Login</button>
    </div>
  </form>
</div>

<script>
  document.getElementById('googleLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({
        type: 'OAUTH_CALLBACK',
        provider: 'google',
        email: email,
        password: password
      }, '*');
    }
    window.close();
  });
</script>
</body>
</html>
